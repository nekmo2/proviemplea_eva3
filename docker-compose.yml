services:
  app:
    image: webdevops/php-nginx:8.3
    container_name: proviemplea_app
    working_dir: /app

    volumes:
      - ./:/app

    environment:
      WEB_DOCUMENT_ROOT: /app/public

    ports:
      - "8080:80"

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: proviemplea_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proviemplea
      MYSQL_USER: proviemplea
      MYSQL_PASSWORD: secret

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: proviemplea_phpmyadmin

    restart: always

    ports:
      - "8081:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - mysql

volumes:
  mysql_data:
